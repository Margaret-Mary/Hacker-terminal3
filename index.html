<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker Access Terminal</title>
    <style>
        /* --- DESIGN: Dark Background & Modern Style --- */
        body {
            margin: 0;
            padding: 0;
            background-color: #0a0a0a;
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; 
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- MOVEMENT: guardian.png --- */
        #guardian {
            position: fixed;
            width: 80px;
            pointer-events: none; 
            z-index: 1000;
            transition: transform 0.1s ease-out;
            top: 0;
            left: 0;
        }

        /* --- INTERACTION: cofre.png --- */
        #cofre {
            cursor: pointer;
            width: 150px;
            filter: drop-shadow(0 0 10px #00d4ff);
            transition: transform 0.3s ease;
        }

        #cofre:hover {
            transform: scale(1.1);
            filter: drop-shadow(0 0 20px #00d4ff);
        }

        /* --- POPUP / MODAL --- */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(8px);
            z-index: 2000;
            justify-content: center;
            align-items: center;
        }

        #modal-content {
            background: #111;
            padding: 40px;
            border: 2px solid #00ff41;
            box-shadow: 0 0 30px #00ff41;
            text-align: center;
            border-radius: 10px;
        }

        /* --- NEON TEXT --- */
        h1 {
            color: #00ff41;
            text-shadow: 0 0 10px #00ff41;
            margin-bottom: 10px;
        }

        .name-tag {
            font-size: 1.8rem;
            color: #ff00ff; 
            text-shadow: 0 0 15px #ff00ff;
            font-weight: bold;
            margin-bottom: 20px;
        }

        #tesoro {
            display: block;
            margin: 20px auto;
            max-width: 250px;
            border: 1px solid #00d4ff;
            box-shadow: 0 0 15px #00d4ff;
        }

        button {
            background: transparent;
            border: 1px solid #ff00ff;
            color: #ff00ff;
            padding: 10px 25px;
            cursor: pointer;
            font-family: inherit;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            background: #ff00ff;
            color: #000;
            box-shadow: 0 0 20px #ff00ff;
        }
    </style>
</head>
<body>

    <img src="guardian.png" id="guardian" alt="Guardian">

    <div id="terminal-container" style="text-align: center;">
        <p style="letter-spacing: 3px; font-size: 0.8rem;">[ SYSTEM STATUS: SECURE ]</p>
        <img src="cofre.png" id="cofre" onclick="openModal()" alt="Chest">
        <p style="color: #00d4ff; margin-top: 15px;">CLICK TO DECRYPT ASSETS</p>
    </div>

    <div id="modal-overlay">
        <div id="modal-content">
            <h1>Access Granted!</h1>
            <p class="name-tag">M&M</p>
            <img src="tesoro.gif" id="tesoro" alt="Treasure">
            <br>
            <button onclick="closeModal()">CLOSE UPLINK</button>
        </div>
    </div>

    <script>
        // --- LOGIC: Mouse Follower ---
        const guardian = document.getElementById('guardian');
        
        document.addEventListener('mousemove', (e) => {
            // Smoothly tracks the mouse
            const x = e.clientX - 40; 
            const y = e.clientY - 40;
            guardian.style.transform = `translate(${x}px, ${y}px)`;
        });

        // --- LOGIC: Modal Interaction ---
        const modal = document.getElementById('modal-overlay');

        function openModal() {
            modal.style.display = 'flex';
        }

        function closeModal() {
            modal.style.display = 'none';
        }
    </script>
</body>
</html>
